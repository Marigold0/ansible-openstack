---
- name: restart nova-api 
  ansible.builtin.systemd_service:
    name: nova-api
    state: restarted
    enabled: yes
  become: yes

- name: restart cinder-api
  ansible.builtin.systemd_service:
    name: cinder-api
    state: restarted
    enabled: true
  become: yes

- name: restart cinder-scheduler
  ansible.builtin.systemd_service:
    name: cinder-scheduler
    state: restarted
    enabled: true
  become: yes

- name: restart cinder-backup
  ansible.builtin.systemd_service:
    name: cinder-backup
    state: restarted
    enabled: true
  become: yes

- name: restart apache2
  ansible.builtin.systemd_service:
    name: apache2
    state: restarted
    enabled: true
  become: yes

